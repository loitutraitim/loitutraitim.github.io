<!doctype html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trò chuyện - Thảo luận</title>
<meta property="og:image" content="https://loitutraitim.github.io/img/bia.png">
<link rel="icon" type="image/webp" href="https://loitutraitim.github.io/img/favicontn.webp">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --page-bg: #DDE7E6;
    --bg: #F3F6F5;
    --header: #0E8A82;
    --header-deep: #07514D;
    --sent-a: #12A39A;
    --sent-b: #0A7A72;
    --received: #FFFFFF;
    --received-border: #E4EAE9;
    --text-dark: #1C2626;
    --text-mute: #82918F;
    --accent: #F2A65A;
    --danger: #C24E4E;
    --radius: 18px;
    --shadow-soft: 0 1px 2px rgba(15,40,38,0.06);
    --shadow-lift: 0 10px 30px rgba(9,50,47,0.14);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: 'Be Vietnam Pro', system-ui, sans-serif;
    background: var(--page-bg);
    color: var(--text-dark);
  }
  body {
    background-image: radial-gradient(circle at 15% 8%, rgba(14,138,130,0.10), transparent 45%),
                       radial-gradient(circle at 85% 92%, rgba(242,166,90,0.10), transparent 45%);
  }
  #app {
    display: flex; flex-direction: column;
    height: 100vh;
    height: calc(var(--app-height, 100vh));
    max-width: 480px; margin: 0 auto;
    background: var(--bg); position: relative;
  }
  @media (min-width: 540px) {
    body { display: flex; align-items: center; justify-content: center; }
    #app { height: 88vh; max-height: 800px; border-radius: 26px; box-shadow: var(--shadow-lift); overflow: hidden; }
  }

  /* Header */
  header {
    background: linear-gradient(135deg, var(--header), var(--header-deep));
    background-image: linear-gradient(135deg, var(--header), var(--header-deep)),
                       radial-gradient(circle at 90% -20%, rgba(255,255,255,0.16), transparent 60%);
    color: #fff;
    padding: 15px 18px;
    display: flex;
    align-items: center;
    gap: 11px;
    box-shadow: 0 4px 14px rgba(7,60,56,0.22);
    flex: none;
    z-index: 2;
    position: relative;
  }
  .avatar-mark {
    width: 36px; height: 36px; border-radius: 50%;
    background: rgba(255,255,255,0.16);
    border: 1px solid rgba(255,255,255,0.22);
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
  }
  .header-text { flex: 1; min-width: 0; }
  .header-title { font-weight: 700; font-size: 15.5px; line-height: 1.2; letter-spacing: 0.1px; }
  .header-sub { font-size: 11.5px; opacity: 0.82; display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #7CE0A8; flex: none; }
  .dot.off { background: rgba(255,255,255,0.5); animation: none; }
  .dot.on { animation: pulse 1.8s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(124,224,168,0.5);} 50% { box-shadow: 0 0 0 5px rgba(124,224,168,0);} }
  .gear-btn {
    background: rgba(255,255,255,0.14);
    border: none; color: #fff; width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    flex: none;
  }
  .gear-btn:hover { background: rgba(255,255,255,0.24); }
  .gear-btn svg { width: 18px; height: 18px; }

  #thread {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .day-sep {
    align-self: center;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-mute);
    background: rgba(130,145,143,0.12);
    padding: 4px 12px;
    border-radius: 20px;
    margin: 14px 0 10px;
  }
  .msg-row { display: flex; align-items: flex-end; gap: 7px; max-width: 88%; margin-bottom: 2px; }
  .msg-row.msg-new { animation: rise 0.22s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .msg-row.own { align-self: flex-end; flex-direction: row-reverse; }
  .msg-row.other { align-self: flex-start; flex-direction: row; }
  .avatar {
    flex: none; width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11.5px; font-weight: 700; color: #fff;
    box-shadow: 0 1px 3px rgba(15,40,38,0.22);
    border: 2px solid var(--bg);
  }
  .avatar.spacer { visibility: hidden; }
  .avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: block; }
  .bubble-col { display: flex; flex-direction: column; min-width: 0; }
  .msg-row.own .bubble-col { align-items: flex-end; }
  .msg-row.other .bubble-col { align-items: flex-start; }
  .sender-name {
    font-size: 11.5px; font-weight: 600; color: var(--header-deep);
    margin: 8px 2px 3px;
  }
  .bubble {
    padding: 9px 13px;
    font-size: 14.5px;
    line-height: 1.44;
    word-wrap: break-word;
    white-space: pre-wrap;
    box-shadow: var(--shadow-soft);
  }
  .msg-row.own .bubble {
    background: linear-gradient(135deg, var(--sent-a), var(--sent-b));
    color: #fff;
    border-radius: var(--radius) var(--radius) 4px var(--radius);
  }
  .msg-row.other .bubble {
    background: var(--received);
    color: var(--text-dark);
    border: 1px solid var(--received-border);
    border-radius: var(--radius) var(--radius) var(--radius) 4px;
  }
  .msg-time {
    font-size: 10px;
    color: var(--text-mute);
    margin: 3px 4px 0;
  }

  .empty-state, .error-state {
    margin: auto;
    text-align: center;
    color: var(--text-mute);
    font-size: 13px;
    padding: 30px 20px;
  }
  .error-state { color: var(--danger); }
  .error-state code { background: #F6E4E4; padding: 1px 5px; border-radius: 4px; font-size: 11px; }

 
  #composer {
    flex: none;
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 10px 14px 16px;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
  }
  #msgInput {
    flex: 1;
    resize: none;
    border: 1px solid var(--received-border);
    background: #fff;
    border-radius: 22px;
    padding: 11px 17px;
    font-family: inherit;
    font-size: 14.5px;
    max-height: 100px;
    line-height: 1.4;
    box-shadow: var(--shadow-soft);
    transition: box-shadow 0.15s ease, border-color 0.15s ease;
  }
  #msgInput:focus { outline: none; border-color: var(--sent-b); box-shadow: 0 0 0 3px rgba(10,122,114,0.12); }
  #sendBtn {
    flex: none;
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, var(--sent-a), var(--sent-b));
    border: none; color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 3px 10px rgba(10,122,114,0.35);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  #sendBtn svg { width: 18px; height: 18px; transform: translateX(-1px); }
  #sendBtn:disabled { background: #B7C4C4; box-shadow: none; cursor: not-allowed; }
  #sendBtn:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(10,122,114,0.4); }
  #sendBtn:active:not(:disabled) { transform: translateY(0); }


  #settingsOverlay {
    position: absolute; inset: 0;
    background: rgba(12,28,26,0.48);
    backdrop-filter: blur(2px);
    display: none;
    align-items: flex-end;
    z-index: 10;
  }
  #settingsOverlay.open { display: flex; }
  #settingsOverlay.open #settingsSheet { animation: sheetUp 0.28s cubic-bezier(.2,.8,.3,1) both; }
  @keyframes sheetUp { from { transform: translateY(24px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  #settingsSheet {
    background: #fff;
    width: 100%;
    max-height: 88%;
    overflow-y: auto;
    border-radius: 24px 24px 0 0;
    padding: 20px 22px 26px;
    box-shadow: 0 -12px 30px rgba(9,50,47,0.18);
  }
  .sheet-handle { width: 38px; height: 4px; background: #DCE3E3; border-radius: 2px; margin: 0 auto 16px; }
  .settings-title { font-weight: 700; font-size: 17px; margin-bottom: 4px; }
  .settings-sub { font-size: 12.5px; color: var(--text-mute); margin-bottom: 18px; }
  .field-group { margin-bottom: 14px; }
  .field-group label {
    display: block; font-size: 11.5px; font-weight: 600; color: var(--text-mute);
    margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px;
  }
  .field-group input {
    width: 100%; padding: 10px 13px; border: 1px solid var(--received-border);
    border-radius: 11px; font-family: inherit; font-size: 14px; color: var(--text-dark);
    background: #FBFDFC;
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .field-group input:focus { outline: none; border-color: var(--sent-b); box-shadow: 0 0 0 3px rgba(10,122,114,0.10); background: #fff; }
  .settings-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-primary, .btn-secondary {
    flex: 1; padding: 12px; border-radius: 12px; border: none;
    font-family: inherit; font-weight: 600; font-size: 13.5px; cursor: pointer;
    transition: transform 0.1s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .btn-primary { background: linear-gradient(135deg, var(--sent-a), var(--sent-b)); color: #fff; box-shadow: 0 4px 12px rgba(10,122,114,0.3); }
  .btn-primary:hover { box-shadow: 0 6px 16px rgba(10,122,114,0.38); transform: translateY(-1px); }
  .btn-secondary { background: #F0F3F3; color: var(--text-dark); }
  .btn-secondary:hover { background: #E4EAEA; }
  .settings-status { font-size: 12px; margin-top: 6px; min-height: 16px; color: var(--danger); }
  .divider { height: 1px; background: var(--received-border); margin: 16px 0; }

  .avatar-dropzone {
    position: relative;
    flex: none;
    width: 68px; height: 68px;
    border-radius: 50%;
    cursor: pointer;
    display: block;
  }
  .avatar-preview-inner {
    width: 100%; height: 100%; border-radius: 50%;
    background: #F0F3F3;
    border: 2px dashed #C9D5D3;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-mute);
    overflow: hidden;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .avatar-preview-inner img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .avatar-preview-inner.has-image { border-style: solid; border-color: var(--received-border); }
  .avatar-dropzone:hover .avatar-preview-inner { border-color: var(--sent-b); background: #EAF4F3; }
  .avatar-cam-badge {
    position: absolute; right: -2px; bottom: -2px;
    width: 24px; height: 24px; border-radius: 50%;
    background: linear-gradient(135deg, var(--sent-a), var(--sent-b));
    border: 2.5px solid #fff;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 6px rgba(10,122,114,0.35);
  }
  .avatar-pick-btn {
    display: inline-block;
    padding: 8px 16px;
    border-radius: 10px;
    background: #F0F3F3;
    color: var(--text-dark);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s ease;
  }
  .avatar-pick-btn:hover { background: #E4EAEA; }
  #avatarUploadStatus.uploading { color: var(--sent-b); }
  #avatarUploadStatus.success { color: #1F8A63; }
  #avatarUploadStatus.error { color: var(--danger); }

  @media (prefers-reduced-motion: reduce) {
    .dot.on { animation: none; }
  }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="avatar-mark">💬</div>
    <div class="header-text">
      <div class="header-title">Trò chuyện</div>
      <div class="header-sub"><span class="dot off" id="statusDot"></span><span id="statusText">Chưa kết nối</span></div>
    </div>
    <button class="gear-btn" id="gearBtn" aria-label="Cài đặt">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 008.6 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H2.5a2 2 0 010-4h.09A1.65 1.65 0 004.6 8.6a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V2.5a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9c.36.19.8.3 1.51 1H21.5a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
    </button>
  </header>

  <div id="thread">
    <div class="empty-state" id="emptyState">Chưa có tin nhắn nào.<br>Nhập tin bên dưới để bắt đầu trò chuyện.</div>
    <div class="error-state" id="readError" style="display:none"></div>
  </div>

  <div id="composer">
    <textarea id="msgInput" rows="1" placeholder="Nhập tin nhắn..." maxlength="500"></textarea>
    <button id="sendBtn" aria-label="Gửi">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>

  <div id="settingsOverlay">
    <div id="settingsSheet">
      <div class="sheet-handle"></div>
      <div class="settings-title">Chào bạn 👋</div>
      <div class="settings-sub">Nhập tên để bắt đầu trò chuyện.</div>

      <div class="field-group">
        <label for="myName">Tên của bạn</label>
        <input type="text" id="myName" placeholder="nhập tên của bạn" maxlength="60">
      </div>
      <div class="field-group">
        <label>Ảnh đại diện</label>
        <div style="display:flex; align-items:center; gap:16px;">
          <label for="avatarFile" id="avatarDropzone" class="avatar-dropzone">
            <div id="avatarPreview" class="avatar-preview-inner">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" width="22" height="22"><path d="M4 16l4.5-5 3 3.5L16 10l4 6"/><circle cx="8.5" cy="8.5" r="1.5"/><rect x="3" y="4" width="18" height="16" rx="3"/></svg>
            </div>
            <div class="avatar-cam-badge">
              <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" width="13" height="13"><path d="M4 8h3l1.5-2h7L17 8h3v11H4z"/><circle cx="12" cy="13.5" r="3.2"/></svg>
            </div>
          </label>
          <div style="flex:1; min-width:0;">
            <label for="avatarFile" class="avatar-pick-btn">Chọn ảnh</label>
            <input type="file" id="avatarFile" accept="image/*" style="position:absolute;width:1px;height:1px;opacity:0;overflow:hidden;">
            <div id="avatarUploadStatus" style="font-size:11px;color:var(--text-mute);margin-top:6px;"></div>
          </div>
        </div>
      </div>

      <div class="settings-status" id="settingsStatus"></div>
      <div class="settings-actions">
        <button class="btn-primary" id="saveSettingsBtn" style="flex:1">Bắt đầu trò chuyện</button>
      </div>
    </div>
  </div>

</div>

<script src="./js/tinnhan.js"></script>
</body>
</html>
